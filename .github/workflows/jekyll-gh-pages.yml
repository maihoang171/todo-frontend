name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]

# 1. Add permissions for GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm install # Use 'npm install' or 'npm ci'

    - name: Run Tests
      run: npm test

    - name: Build project
      run: npm run build # This applies your 'base' config and creates /dist

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        # VERY IMPORTANT: Point to the 'dist' folder created by Vite
        path: './dist'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4